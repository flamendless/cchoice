root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[env]
  TEMPL_DEV_MODE = "true"

[build]
  args_bin = []
  entrypoint = ["./tmp/main"]
  cmd = "mage buildserve"
  delay = 300
  exclude_dir = [
    "internal/database/queries",
    "cmd/web/static/images",
    "cmd/web/static/thumbnails",
    "cmd/web/static/svg",
    "cmd/goose",
    "internal/receipt",
    "tmp",
  ]
  exclude_file = ["internal/conf/version_gen.go", "internal/utils/assets_gen.go"]
  exclude_regex = [".*_test.go", ".*.sql.go", ".*_templ.go", ".*_string.go"]
  exclude_unchanged = true
  follow_symlink = false
  include_dir = ["cmd/web", "internal"]
  include_ext = ["tpl", "tmpl", "templ", "html", "js", "css", "go"]
  include_file = []
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
